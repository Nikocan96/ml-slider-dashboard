<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ML_MAIN_SLIDER &middot; Dashboard de Gobernanza</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;color:#c9d1d9;font-family:'Segoe UI',system-ui,sans-serif;font-size:13px}
.header{background:#161b22;border-bottom:1px solid #21262d;padding:12px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.header h1{font-size:16px;font-weight:700;color:#e6edf3;white-space:nowrap}
.header h1 span{color:#58a6ff}
.badges{display:flex;gap:8px;flex-wrap:wrap;flex:1}
.badge{background:#21262d;border:1px solid #30363d;border-radius:4px;padding:3px 10px;font-size:11px;color:#8b949e}
.badge strong{color:#58a6ff}
.team-tag{background:#2a2500;border:1px solid #ffe600;border-radius:4px;padding:3px 10px;font-size:12px;color:#ffe600;font-weight:600;white-space:nowrap}
.filter-row{padding:10px 24px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;border-bottom:1px solid #21262d}
.filter-row .lbl{color:#8b949e;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-right:2px}
.sep{color:#30363d;font-size:18px;margin:0 6px}
.sbtn{background:#161b22;border:1px solid #30363d;border-radius:6px;padding:5px 14px;font-size:12px;color:#8b949e;cursor:pointer;transition:all .15s}
.sbtn:hover{border-color:#58a6ff;color:#c9d1d9}
.sbtn.active{background:#238636;border-color:#2ea043;color:#fff;font-weight:700}
.fbtn{background:#21262d;border:1px solid #30363d;border-radius:6px;padding:5px 14px;font-size:12px;color:#8b949e;cursor:pointer;transition:all .15s}
.fbtn:hover{border-color:#58a6ff;color:#c9d1d9}
.fbtn.active{background:#1f6feb;border-color:#1f6feb;color:#fff;font-weight:700}
.ros-legend{padding:5px 24px 8px;font-size:11px;color:#6e7681}
.ros-legend .tr{color:#3fb950;font-weight:700}
.ros-legend .ts{color:#f0883e;font-weight:700}
.summary{display:flex;gap:12px;padding:12px 24px;flex-wrap:wrap}
.sum-card{background:#161b22;border:1px solid #21262d;border-radius:8px;padding:10px 16px;min-width:140px}
.sum-card .lbl{font-size:10px;color:#6e7681;text-transform:uppercase;letter-spacing:.5px}
.sum-card .val{font-size:20px;font-weight:700;color:#e6edf3;margin-top:2px}
.sum-card .sub{font-size:10px;color:#6e7681;margin-top:1px}
.section{margin:0 24px 20px}
.sh{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:2px solid;cursor:pointer;user-select:none}
.sh h2{font-size:13px;font-weight:700}
.sh .desc{font-size:11px;color:#6e7681;margin-left:4px}
.sh .cnt{font-size:11px;color:#6e7681;margin-left:auto}
.sh .arr{font-size:10px;color:#6e7681;transition:transform .2s}
.sh.collapsed .arr{transform:rotate(-90deg)}
.tbl-wrap{overflow-x:auto}
.tbl{width:100%;border-collapse:collapse}
.tbl th{background:#161b22;color:#6e7681;font-size:10px;text-transform:uppercase;letter-spacing:.5px;padding:6px 10px;text-align:left;border-bottom:1px solid #21262d;white-space:nowrap;cursor:pointer}
.tbl th:hover{color:#c9d1d9}
.tbl td{padding:6px 10px;border-bottom:1px solid #21262d;white-space:nowrap}
.tbl tr:hover td{background:#1c2128}
.tbl tr:last-child td{border-bottom:none}
.num{text-align:right;font-variant-numeric:tabular-nums;font-family:'Consolas',monospace}
.tag{display:inline-block;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:600}
.tag-r{background:#1a3d2b;color:#3fb950}
.tag-s{background:#3d2a0e;color:#f0883e}
.id-c{font-family:'Consolas',monospace;font-size:11px;color:#58a6ff}
.bar-wrap{display:flex;align-items:center;gap:6px}
.bar-outer{width:60px;height:6px;background:#21262d;border-radius:3px;flex-shrink:0}
.bar-inner{height:6px;border-radius:3px}
.bar-pct{font-size:10px;color:#8b949e;min-width:36px}
.no-data{padding:18px 0;color:#6e7681;font-style:italic;font-size:12px}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#0d1117}
::-webkit-scrollbar-thumb{background:#30363d;border-radius:3px}
</style>
</head>
<body>
<div class="header">
  <h1>ML_MAIN_<span>SLIDER</span> &middot; Dashboard de Gobernanza</h1>
  <div class="badges">
    <div class="badge">M&eacute;tricas: <strong>&#x23F1; &Uacute;ltimos 7 d&iacute;as</strong></div>
    <div class="badge">Vigencia: <strong>Activos ahora</strong></div>
    <div class="badge">Actualizado: <strong id="upd-ts">cargando&hellip;</strong> &nbsp;&middot;&nbsp; cada hora</div>
  </div>
  <div class="team-tag">Producto &middot; Site Merch</div>
</div>
<div class="filter-row">
  <span class="lbl">Site:</span>
  <button class="sbtn active" onclick="setSite('MLA',this)">MLA</button>
  <button class="sbtn" onclick="setSite('MLB',this)">MLB</button>
  <button class="sbtn" onclick="setSite('MLM',this)">MLM</button>
  <button class="sbtn" onclick="setSite('MLC',this)">MLC</button>
  <button class="sbtn" onclick="setSite('MLU',this)">MLU</button>
  <button class="sbtn" onclick="setSite('MCO',this)">MCO</button>
  <button class="sbtn" onclick="setSite('MPE',this)">MPE</button>
  <span class="sep">|</span>
  <span class="lbl">Audiencia:</span>
  <button class="fbtn active" onclick="setFilter('all',this)">Todos</button>
  <button class="fbtn" onclick="setFilter('ros_only',this)">Solo ROS</button>
  <button class="fbtn" onclick="setFilter('segmented_only',this)">Solo Segmentados</button>
</div>
<div class="ros-legend">
  <span class="tr">ROS</span> = Audiencia abierta / sin segmentaci&oacute;n &nbsp;&middot;&nbsp;
  <span class="ts">Seg.</span> = Con segmentaci&oacute;n (DMP, audiencia, contexto o geo)
</div>
<div class="summary" id="summary"></div>
<div id="content"></div>
<script>
let DATA=[];

const CLUSTERS=[
  {id:'PRIORIDAD_0',        label:'PRIORIDAD 0',        desc:'GUARANTEED',                  color:'#a371f7'},
  {id:'PRIORIDAD_PRINCIPAL',label:'PRIORIDAD PRINCIPAL',desc:'PROGRAMMATIC \u00b7 PRIMARY', color:'#f0883e'},
  {id:'PRIORIDAD_ALTA',     label:'PRIORIDAD ALTA',     desc:'PROGRAMMATIC \u00b7 HIGH',    color:'#58a6ff'},
  {id:'PRIORIDAD_MEDIA',    label:'PRIORIDAD MEDIA',    desc:'PROGRAMMATIC \u00b7 MEDIUM',  color:'#3fb950'},
];

let cSite='MLA', cFilter='all';
const sortState={};
CLUSTERS.forEach(function(cl){sortState[cl.id]={key:null,dir:-1};});

function fmtN(v){return v==null?'<span style="color:#6e7681">\u2014</span>':v.toLocaleString('es-AR');}
function fmtCtr(v){return v==null?'<span style="color:#6e7681">\u2014</span>':(v*100).toFixed(3)+'%';}
function fmtSoi(v){return(v==null||isNaN(v))?'\u2014':(v*100).toFixed(1)+'%';}
function miniDonut(ros,seg,sz){
  var tot=ros+seg; if(!tot)return '';
  var r=(sz-8)/2,cx=sz/2,cy=sz/2,c=2*Math.PI*r;
  var rl=(ros/tot*c).toFixed(1),sl=(seg/tot*c).toFixed(1),rd=(ros/tot*360-90).toFixed(1);
  var s='<svg width="'+sz+'" height="'+sz+'" style="display:block">';
  s+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="#21262d" stroke-width="6"/>';
  if(ros>0)s+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="#3fb950" stroke-width="6" stroke-dasharray="'+rl+' '+c.toFixed(1)+'" transform="rotate(-90 '+cx+' '+cy+')"/>';
  if(seg>0)s+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="#f0883e" stroke-width="6" stroke-dasharray="'+sl+' '+c.toFixed(1)+'" transform="rotate('+rd+' '+cx+' '+cy+')"/>';
  s+='</svg>';
  return s;
}

function setSite(s,btn){
  cSite=s;
  document.querySelectorAll('.sbtn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  render();
}
function setFilter(f,btn){
  cFilter=f;
  document.querySelectorAll('.fbtn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  render();
}
function sortBy(cid,k){
  var s=sortState[cid];
  if(s.key===k)s.dir*=-1;else{s.key=k;s.dir=-1;}
  render();
}
function toggleSection(h){
  h.classList.toggle('collapsed');
  var b=h.nextElementSibling;
  b.style.display=b.style.display==='none'?'':'none';
}

function render(){
  var fd=DATA.filter(function(r){return r.site===cSite;});
  if(cFilter==='ros_only')fd=fd.filter(function(r){return r.ros;});
  else if(cFilter==='segmented_only')fd=fd.filter(function(r){return !r.ros;});

  var totals={};
  CLUSTERS.forEach(function(cl){
    totals[cl.id]=fd.filter(function(r){return r.c===cl.id;}).reduce(function(a,r){return a+r.impr;},0);
  });

  var tI=fd.reduce(function(a,r){return a+r.impr;},0);
  var tC=fd.reduce(function(a,r){return a+r.clk;},0);
  var tLI=new Set(fd.map(function(r){return r.li;})).size;
  var tCm=new Set(fd.map(function(r){return r.camp;})).size;
  var tRos=fd.filter(function(r){return r.ros;}).length;
  var tSeg=fd.filter(function(r){return !r.ros;}).length;
  var rosPct=tLI>0?Math.round(tRos/tLI*100):0;
  var segPct=tLI>0?Math.round(tSeg/tLI*100):0;

  document.getElementById('summary').innerHTML=
    '<div class="sum-card"><div class="lbl">Impresiones (7d)</div><div class="val">'+tI.toLocaleString('es-AR')+'</div><div class="sub">'+cSite+'</div></div>'+
    '<div class="sum-card"><div class="lbl">Clicks (7d)</div><div class="val">'+tC.toLocaleString('es-AR')+'</div><div class="sub">CTR '+(tI?((tC/tI)*100).toFixed(3)+'%':'\u2014')+'</div></div>'+
    '<div class="sum-card"><div class="lbl">Line Items activos</div><div class="val">'+tLI+'</div><div class="sub">activos ahora</div></div>'+
    '<div class="sum-card"><div class="lbl">Campa\u00f1as activas</div><div class="val">'+tCm+'</div><div class="sub">distintas</div></div>'+
    '<div class="sum-card" style="min-width:160px"><div class="lbl">Segmentaci\u00f3n</div>'+
    '<div style="display:flex;align-items:center;gap:10px;margin-top:6px">'+
    miniDonut(tRos,tSeg,52)+
    '<div><div style="font-size:11px;color:#3fb950">\u25cf ROS &nbsp;'+rosPct+'%</div>'+
    '<div style="font-size:11px;color:#f0883e">\u25cf Seg. '+segPct+'%</div></div>'+
    '</div></div>';

  var html='';
  CLUSTERS.forEach(function(cl){
    var rows=fd.filter(function(r){return r.c===cl.id;});
    if(!rows.length){
      if(cl.id==='PRIORIDAD_0'){
        html+='<div class="section">'+
          '<div class="sh" style="border-color:'+cl.color+'" onclick="toggleSection(this)">'+
          '<div style="width:8px;height:8px;border-radius:50%;background:'+cl.color+';flex-shrink:0"></div>'+
          '<h2 style="color:'+cl.color+'">'+cl.label+'</h2>'+
          '<span class="desc">'+cl.desc+'</span>'+
          '<span class="cnt">0 line items</span>'+
          '<span class="arr">\u25bc</span></div>'+
          '<div><div class="no-data">Sin campa\u00f1as GUARANTEED activas en '+cSite+'.</div></div></div>';
      }
      return;
    }

    var ss=sortState[cl.id];
    var sorted=rows.slice();
    if(ss.key){
      sorted.sort(function(a,b){
        var av=a[ss.key],bv=b[ss.key];
        if(av==null)av=ss.dir>0?-Infinity:Infinity;
        if(bv==null)bv=ss.dir>0?-Infinity:Infinity;
        return(av>bv?1:av<bv?-1:0)*ss.dir;
      });
    }else{
      sorted.sort(function(a,b){return b.impr-a.impr;});
    }

    var ct=totals[cl.id];
    var cid=cl.id;
    var tbody=sorted.map(function(r){
      var s=(ct>0&&r.impr>0)?r.impr/ct:null;
      var bp=s?Math.round(s*100):0;
      var ow=r.owner||'<span style="color:#6e7681">\u2014</span>';
      var rt=r.ros?'<span class="tag tag-r">ROS</span>':'<span class="tag tag-s">Seg.</span>';
      var base='https://ads.adminml.com/display/';
      var qp='accountId='+r.acc_id+'&campaignId='+r.camp+'&advertiserId='+r.adv_id+'&filters=range:15+attribution_metric:action';
      var liUrl=base+'creatives?'+qp+'&lineItemId='+r.li;
      var campUrl=base+'lineitems?'+qp;
      return '<tr>'+
        '<td><a class="id-c" href="'+liUrl+'" target="_blank" style="text-decoration:none">'+r.li+'</a></td>'+
        '<td><a class="id-c" href="'+campUrl+'" target="_blank" style="text-decoration:none">'+r.camp+'</a></td>'+
        '<td>'+ow+'</td>'+
        '<td class="num">'+fmtN(r.impr)+'</td>'+
        '<td class="num">'+fmtN(r.clk)+'</td>'+
        '<td class="num">'+fmtCtr(r.ctr)+'</td>'+
        '<td><div class="bar-wrap"><div class="bar-outer"><div class="bar-inner" style="width:'+bp+'%;background:'+cl.color+'"></div></div><span class="bar-pct">'+fmtSoi(s)+'</span></div></td>'+
        '<td>'+rt+'</td>'+
        '<td style="color:#6e7681;font-size:11px">'+r.end+'</td>'+
        '</tr>';
    }).join('');

    html+='<div class="section">'+
      '<div class="sh" style="border-color:'+cl.color+'" onclick="toggleSection(this)">'+
      '<div style="width:8px;height:8px;border-radius:50%;background:'+cl.color+';flex-shrink:0"></div>'+
      '<h2 style="color:'+cl.color+'">'+cl.label+'</h2>'+
      '<span class="desc">'+cl.desc+'</span>'+
      '<span class="cnt">'+rows.length+' line item'+(rows.length!==1?'s':'')+'</span>'+
      '<span class="arr">\u25bc</span></div>'+
      '<div><div class="tbl-wrap"><table class="tbl"><thead><tr>'+
      '<th onclick="sortBy(\''+cid+'\',\'li\')">Line Item</th>'+
      '<th onclick="sortBy(\''+cid+'\',\'camp\')">Campaign</th>'+
      '<th onclick="sortBy(\''+cid+'\',\'owner\')">Owner</th>'+
      '<th onclick="sortBy(\''+cid+'\',\'impr\')" class="num">Impresiones (7d) \u25be</th>'+
      '<th onclick="sortBy(\''+cid+'\',\'clk\')" class="num">Clicks (7d)</th>'+
      '<th onclick="sortBy(\''+cid+'\',\'ctr\')" class="num">CTR</th>'+
      '<th>Share de Impr.</th>'+
      '<th onclick="sortBy(\''+cid+'\',\'ros\')">Tipo de Audiencia</th>'+
      '<th onclick="sortBy(\''+cid+'\',\'end\')">End Date</th>'+
      '</tr></thead><tbody>'+tbody+'</tbody></table></div></div></div>';
  });
  document.getElementById('content').innerHTML=html;
}

var lastUpdated=null;
function updateTimeBadge(){
  var el=document.getElementById('upd-ts');
  if(!el||!lastUpdated)return;
  var mins=Math.floor((Date.now()-lastUpdated)/60000);
  el.textContent=mins<=0?'hace menos de 1 min':'hace '+mins+(mins===1?' minuto':' minutos');
}
setInterval(updateTimeBadge,60000);

fetch('data.json')
  .then(function(r){
    var lm=r.headers.get('Last-Modified');
    return r.json().then(function(d){return{d:d,lm:lm};});
  })
  .then(function(o){
    DATA=o.d.data||o.d;
    if(o.lm){lastUpdated=new Date(o.lm).getTime();updateTimeBadge();}
    render();
  })
  .catch(function(e){console.error('Error cargando data.json:',e);});
</script>
</body>
</html>
